<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SFU Loopback Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
  h1 { margin-bottom: 1rem; color: #fff; }
  .videos { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
  .video-box { flex: 1; min-width: 320px; }
  .video-box h3 { margin-bottom: 0.5rem; font-size: 0.9rem; color: #aaa; }
  video { width: 100%; background: #000; border-radius: 8px; }
  button { padding: 0.6rem 1.5rem; font-size: 1rem; border: none; border-radius: 6px;
           cursor: pointer; background: #0f3460; color: #fff; }
  button:hover { background: #16213e; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { margin: 1rem 0; padding: 1rem; background: #16213e; border-radius: 8px;
            font-family: monospace; font-size: 0.85rem; white-space: pre-wrap;
            max-height: 300px; overflow-y: auto; }
  .controls { display: flex; gap: 1rem; align-items: center; }
</style>
</head>
<body>

<h1>WebRTC SFU Loopback Test</h1>

<div class="controls">
  <button id="micBtn" onclick="startLoopback('mic')">Mic Only</button>
  <button id="camBtn" onclick="startLoopback('camera')">Camera + Mic</button>
  <button id="screenBtn" onclick="startLoopback('screen')">Share Screen</button>
  <button id="stopBtn" onclick="stopLoopback()" disabled>Stop</button>
</div>

<div class="videos">
  <div class="video-box">
    <h3 id="localLabel">Local</h3>
    <video id="localVideo" autoplay muted playsinline></video>
  </div>
  <div class="video-box">
    <h3>Remote (loopback from SFU)</h3>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>
</div>

<div id="status">Ready. Click "Start Loopback" to begin.</div>

<script>
let pc = null;
let localStream = null;

function log(msg) {
  const el = document.getElementById('status');
  const ts = new Date().toLocaleTimeString();
  el.textContent += '\n[' + ts + '] ' + msg;
  el.scrollTop = el.scrollHeight;
}

async function startLoopback(mode) {
  document.getElementById('micBtn').disabled = true;
  document.getElementById('camBtn').disabled = true;
  document.getElementById('screenBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;

  try {
    // Get media based on mode
    if (mode === 'screen') {
      log('Requesting screen share...');
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true,  // system audio (browser will ask)
      });
      document.getElementById('localLabel').textContent = 'Local (screen)';
    } else if (mode === 'camera') {
      log('Requesting camera and microphone...');
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      } catch (e) {
        log('No camera, trying audio-only: ' + e.message);
        localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
      }
      document.getElementById('localLabel').textContent = 'Local (camera)';
    } else {
      log('Requesting microphone...');
      localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
      document.getElementById('localLabel').textContent = 'Local (mic)';
    }
    document.getElementById('localVideo').srcObject = localStream;
    log('Got local media: ' + localStream.getTracks().map(t => t.kind).join(', '));

    // Create peer connection
    pc = new RTCPeerConnection({ iceServers: [] });

    pc.oniceconnectionstatechange = () => {
      log('ICE: ' + pc.iceConnectionState);
    };
    pc.onconnectionstatechange = () => {
      log('Connection: ' + pc.connectionState);
    };
    pc.ontrack = (event) => {
      log('Remote track received: ' + event.track.kind);
      document.getElementById('remoteVideo').srcObject = event.streams[0];
    };

    // Add local tracks
    for (const track of localStream.getTracks()) {
      pc.addTrack(track, localStream);
    }

    // Create offer
    log('Creating SDP offer...');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // Wait for ICE gathering to complete (or timeout after 2s)
    if (pc.iceGatheringState !== 'complete') {
      log('Waiting for ICE candidates...');
      await new Promise((resolve) => {
        const timeout = setTimeout(resolve, 2000);
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') {
            clearTimeout(timeout);
            resolve();
          }
        };
      });
    }

    // Send the complete offer (with ICE candidates)
    const completeOffer = pc.localDescription;
    log('Sending SDP offer (' + completeOffer.sdp.length + ' bytes)...');

    const resp = await fetch('/signal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: completeOffer.type, sdp: completeOffer.sdp }),
    });

    if (!resp.ok) {
      throw new Error('Signal POST failed: ' + resp.status + ' ' + await resp.text());
    }

    const { request_id } = await resp.json();
    log('Offer sent, request_id: ' + request_id);

    // Poll for answer
    log('Polling for SDP answer...');
    const answer = await pollForAnswer(request_id);
    log('Got SDP answer (' + answer.sdp.length + ' bytes)');

    // Set remote description
    await pc.setRemoteDescription(new RTCSessionDescription(answer));
    log('Remote description set. Waiting for media...');

  } catch (err) {
    log('ERROR: ' + err.message);
    stopLoopback();
  }
}

async function pollForAnswer(requestId) {
  const maxAttempts = 30;
  for (let i = 0; i < maxAttempts; i++) {
    const resp = await fetch('/signal/' + requestId);
    if (resp.status === 200) {
      return await resp.json();
    }
    if (resp.status === 404) {
      throw new Error('Unknown request_id');
    }
    // 202 = still pending
    await new Promise(r => setTimeout(r, 200));
  }
  throw new Error('Timeout waiting for SDP answer');
}

function stopLoopback() {
  if (pc) {
    pc.close();
    pc = null;
  }
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('micBtn').disabled = false;
  document.getElementById('camBtn').disabled = false;
  document.getElementById('screenBtn').disabled = false;
  document.getElementById('localLabel').textContent = 'Local';
  document.getElementById('stopBtn').disabled = true;
  log('Stopped.');
}
</script>
</body>
</html>
