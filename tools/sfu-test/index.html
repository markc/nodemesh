<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SFU Room Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
  h1 { margin-bottom: 1rem; color: #fff; }
  .videos { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
  .video-box { flex: 1; min-width: 320px; }
  .video-box h3 { margin-bottom: 0.5rem; font-size: 0.9rem; color: #aaa; }
  video { width: 100%; background: #000; border-radius: 8px; }
  button { padding: 0.6rem 1.5rem; font-size: 1rem; border: none; border-radius: 6px;
           cursor: pointer; background: #0f3460; color: #fff; }
  button:hover { background: #16213e; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { margin: 1rem 0; padding: 1rem; background: #16213e; border-radius: 8px;
            font-family: monospace; font-size: 0.85rem; white-space: pre-wrap;
            max-height: 300px; overflow-y: auto; }
  .controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  input, select { padding: 0.5rem; font-size: 1rem; border-radius: 6px; border: 1px solid #333;
                  background: #16213e; color: #e0e0e0; }
  label { font-size: 0.9rem; color: #aaa; }
</style>
</head>
<body>

<h1>WebRTC SFU Room Test</h1>

<div class="controls">
  <label>Room: <input id="roomInput" type="text" value="test-room" size="12"></label>
  <label>Mode:
    <select id="modeSelect">
      <option value="camera">Camera + Mic</option>
      <option value="screen">Screen Share</option>
      <option value="mic">Mic Only</option>
    </select>
  </label>
  <button id="pubBtn" onclick="startPublish()">Publish</button>
  <button id="subBtn" onclick="startSubscribe()">Subscribe</button>
  <button id="loopBtn" onclick="startLoopback()">Loopback (no room)</button>
  <button id="stopBtn" onclick="stop()" disabled>Stop</button>
</div>

<div class="videos">
  <div class="video-box">
    <h3 id="localLabel">Local</h3>
    <video id="localVideo" autoplay muted playsinline></video>
  </div>
  <div class="video-box">
    <h3 id="remoteLabel">Remote</h3>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>
</div>

<div id="status">Ready. Publish to send media, Subscribe to receive, or Loopback for echo test.</div>

<script>
let pc = null;
let localStream = null;

function log(msg) {
  const el = document.getElementById('status');
  const ts = new Date().toLocaleTimeString();
  el.textContent += '\n[' + ts + '] ' + msg;
  el.scrollTop = el.scrollHeight;
}

function setButtonsDisabled(disabled) {
  document.getElementById('pubBtn').disabled = disabled;
  document.getElementById('subBtn').disabled = disabled;
  document.getElementById('loopBtn').disabled = disabled;
  document.getElementById('stopBtn').disabled = !disabled;
}

async function getLocalMedia(mode) {
  if (mode === 'screen') {
    log('Requesting screen share...');
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    document.getElementById('localLabel').textContent = 'Local (screen)';
    return stream;
  } else if (mode === 'camera') {
    log('Requesting camera and microphone...');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localLabel').textContent = 'Local (camera)';
      return stream;
    } catch (e) {
      log('No camera, trying audio-only: ' + e.message);
      const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
      document.getElementById('localLabel').textContent = 'Local (mic)';
      return stream;
    }
  } else {
    log('Requesting microphone...');
    const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
    document.getElementById('localLabel').textContent = 'Local (mic)';
    return stream;
  }
}

function createPeerConnection() {
  const conn = new RTCPeerConnection({ iceServers: [] });
  conn.oniceconnectionstatechange = () => log('ICE: ' + conn.iceConnectionState);
  conn.onconnectionstatechange = () => log('Connection: ' + conn.connectionState);
  conn.ontrack = (event) => {
    log('Remote track received: ' + event.track.kind);
    document.getElementById('remoteVideo').srcObject = event.streams[0] || new MediaStream([event.track]);
  };
  return conn;
}

async function waitForIce(conn) {
  if (conn.iceGatheringState !== 'complete') {
    log('Waiting for ICE candidates...');
    await new Promise((resolve) => {
      const timeout = setTimeout(resolve, 2000);
      conn.onicegatheringstatechange = () => {
        if (conn.iceGatheringState === 'complete') {
          clearTimeout(timeout);
          resolve();
        }
      };
    });
  }
}

async function sendOffer(sdp, room, role) {
  const body = { type: sdp.type, sdp: sdp.sdp };
  if (room) body.room = room;
  if (role) body.role = role;

  const resp = await fetch('/signal', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    throw new Error('Signal POST failed: ' + resp.status + ' ' + await resp.text());
  }
  return await resp.json();
}

async function pollForAnswer(requestId) {
  const maxAttempts = 30;
  for (let i = 0; i < maxAttempts; i++) {
    const resp = await fetch('/signal/' + requestId);
    if (resp.status === 200) return await resp.json();
    if (resp.status === 404) throw new Error('Unknown request_id');
    await new Promise(r => setTimeout(r, 200));
  }
  throw new Error('Timeout waiting for SDP answer');
}

async function startPublish() {
  setButtonsDisabled(true);
  const room = document.getElementById('roomInput').value.trim();
  const mode = document.getElementById('modeSelect').value;
  if (!room) { log('ERROR: room name required'); setButtonsDisabled(false); return; }

  try {
    localStream = await getLocalMedia(mode);
    document.getElementById('localVideo').srcObject = localStream;
    log('Got local media: ' + localStream.getTracks().map(t => t.kind).join(', '));

    pc = createPeerConnection();
    for (const track of localStream.getTracks()) {
      pc.addTrack(track, localStream);
    }

    log('Creating SDP offer (publisher)...');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitForIce(pc);

    const completeOffer = pc.localDescription;
    log('Sending SDP offer (' + completeOffer.sdp.length + ' bytes)...');
    const { request_id } = await sendOffer(completeOffer, room, 'publisher');
    log('Offer sent, request_id: ' + request_id);

    log('Polling for SDP answer...');
    const answer = await pollForAnswer(request_id);
    log('Got SDP answer (' + answer.sdp.length + ' bytes)');

    await pc.setRemoteDescription(new RTCSessionDescription(answer));
    document.getElementById('remoteLabel').textContent = 'Remote (publishing to: ' + room + ')';
    log('Publishing to room: ' + room);
  } catch (err) {
    log('ERROR: ' + err.message);
    stop();
  }
}

async function startSubscribe() {
  setButtonsDisabled(true);
  const room = document.getElementById('roomInput').value.trim();
  if (!room) { log('ERROR: room name required'); setButtonsDisabled(false); return; }

  try {
    pc = createPeerConnection();

    // Add recvonly transceivers for audio and video
    pc.addTransceiver('audio', { direction: 'recvonly' });
    pc.addTransceiver('video', { direction: 'recvonly' });

    log('Creating SDP offer (subscriber)...');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitForIce(pc);

    const completeOffer = pc.localDescription;
    log('Sending SDP offer (' + completeOffer.sdp.length + ' bytes)...');
    const { request_id } = await sendOffer(completeOffer, room, 'subscriber');
    log('Offer sent, request_id: ' + request_id);

    log('Polling for SDP answer...');
    const answer = await pollForAnswer(request_id);
    log('Got SDP answer (' + answer.sdp.length + ' bytes)');

    await pc.setRemoteDescription(new RTCSessionDescription(answer));
    document.getElementById('remoteLabel').textContent = 'Remote (subscribed to: ' + room + ')';
    document.getElementById('localLabel').textContent = 'Local (subscriber — no media)';
    log('Subscribed to room: ' + room + '. Waiting for media...');
  } catch (err) {
    log('ERROR: ' + err.message);
    stop();
  }
}

async function startLoopback() {
  setButtonsDisabled(true);
  const mode = document.getElementById('modeSelect').value;

  try {
    localStream = await getLocalMedia(mode);
    document.getElementById('localVideo').srcObject = localStream;
    log('Got local media: ' + localStream.getTracks().map(t => t.kind).join(', '));

    pc = createPeerConnection();
    for (const track of localStream.getTracks()) {
      pc.addTrack(track, localStream);
    }

    log('Creating SDP offer (loopback)...');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitForIce(pc);

    const completeOffer = pc.localDescription;
    log('Sending SDP offer (' + completeOffer.sdp.length + ' bytes)...');
    const { request_id } = await sendOffer(completeOffer, null, null);
    log('Offer sent, request_id: ' + request_id);

    log('Polling for SDP answer...');
    const answer = await pollForAnswer(request_id);
    log('Got SDP answer (' + answer.sdp.length + ' bytes)');

    await pc.setRemoteDescription(new RTCSessionDescription(answer));
    document.getElementById('remoteLabel').textContent = 'Remote (loopback from SFU)';
    log('Loopback mode. Waiting for media...');
  } catch (err) {
    log('ERROR: ' + err.message);
    stop();
  }
}

function stop() {
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('localLabel').textContent = 'Local';
  document.getElementById('remoteLabel').textContent = 'Remote';
  setButtonsDisabled(false);
  log('Stopped.');
}
</script>
</body>
</html>
